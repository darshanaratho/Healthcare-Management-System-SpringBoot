<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button onclick="goBack()">⬅ Back</button>

<h2>Appointment Management</h2>

<!-- ADD -->
<h3>Book Appointment</h3>
<input id="date" type="date">
<input id="patientId" placeholder="Patient ID">
<input id="doctorId" placeholder="Doctor ID">
<button onclick="addAppointment()">Book</button>

<!-- UPDATE -->
<h3>Update Appointment</h3>
<input id="updateId" placeholder="ID">
<input id="updateDate" type="date">
<input id="updatePatientId" placeholder="Patient ID">
<input id="updateDoctorId" placeholder="Doctor ID">
<button onclick="updateAppointment()">Update</button>

<!-- TABLE -->
<h3>Appointment List</h3>
<table border="1" align="center">
    <thead>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="appointmentTable"></tbody>
</table>

<script>
function goBack() {
    window.location.href = "index.html";
}
</script>

<script src="js/appointment.js"></script>
</body>
</html>
