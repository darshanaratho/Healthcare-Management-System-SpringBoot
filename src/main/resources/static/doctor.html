<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button onclick="goBack()">⬅ Back</button>

<h2>Doctor Management</h2>

<!-- ADD -->
<h3>Add Doctor</h3>
<input id="name" placeholder="Doctor Name">
<input id="spec" placeholder="Specialization">
<button onclick="addDoctor()">Add</button>

<!-- UPDATE -->
<h3>Update Doctor</h3>
<input id="updateId" placeholder="ID">
<input id="updateName" placeholder="New Name">
<input id="updateSpec" placeholder="New Specialization">
<button onclick="updateDoctor()">Update</button>

<!-- TABLE -->
<h3>Doctor List</h3>
<table border="1" align="center">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="doctorTable"></tbody>
</table>

<script>
function goBack() {
    window.location.href = "index.html";
}
</script>

<script src="js/doctor.js"></script>
</body>
</html>
